name: Build

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  PROJECT_NAME: BallanceModLoaderPlus
  BASE_BUILD_DIR: ${{ github.workspace }}\build
  BASE_DIST_DIR: ${{ github.workspace }}\dist
  CKANGELSCRIPT_VERSION: v0.3.0

jobs:
  validate-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6.0.2

      - name: Validate release version markers
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag must use vX.Y.Z format: $tag"
          }

          $version = $tag.Substring(1)
          $cmake = Get-Content -LiteralPath 'CMakeLists.txt' -Raw
          if ($cmake -notmatch "VERSION\s+$([regex]::Escape($version))(\s|$)") {
            throw "CMakeLists.txt project VERSION must be $version"
          }

          $readme = Get-Content -LiteralPath 'README.md' -Encoding utf8 -Raw
          if (-not $readme.Contains("Current version: $tag")) {
            throw "README.md must contain: Current version: $tag"
          }

          $readmeZh = Get-Content -LiteralPath 'README_zh-CN.md' -Encoding utf8 -Raw
          if (-not $readmeZh.Contains("当前版本：$tag")) {
            throw "README_zh-CN.md must contain: 当前版本：$tag"
          }

  build:
    runs-on: windows-latest

    strategy:
      matrix:
        configuration: [ Release, Debug ]

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Checkout Virtools SDK
        uses: actions/checkout@v6.0.2
        with:
          repository: doyaGu/Virtools-SDK-2.1
          path: Virtools-SDK-2.1

      - name: Download CKAngelScript release
        shell: pwsh
        run: |
          $downloadDir = "${{ github.workspace }}\artifacts\ckangelscript"
          $extractDir = "${{ github.workspace }}\artifacts\ckangelscript-release"
          New-Item -ItemType Directory -Force -Path $downloadDir, $extractDir | Out-Null
          $archive = Join-Path $downloadDir "CKAngelScript-$env:CKANGELSCRIPT_VERSION-Release.zip"
          $url = "https://github.com/doyaGu/CKAngelScript/releases/download/$env:CKANGELSCRIPT_VERSION/CKAngelScript-$env:CKANGELSCRIPT_VERSION-Release.zip"
          Invoke-WebRequest -Uri $url -OutFile $archive
          Expand-Archive -LiteralPath $archive -DestinationPath $extractDir -Force
          foreach ($required in @(
            (Join-Path $extractDir 'bin\AngelScript.dll'),
            (Join-Path $extractDir 'include\CKAngelScript.h'),
            (Join-Path $extractDir 'include\angelscript.h')
          )) {
            if (-not (Test-Path -LiteralPath $required -PathType Leaf)) {
              throw "CKAngelScript release package is missing required file: $required"
            }
          }

      - name: Show tool versions
        shell: pwsh
        run: cmake --version

      - name: Set build metadata
        shell: pwsh
        run: |
          $shortSha = git rev-parse --short HEAD
          "SHORT_SHA=$shortSha" >> $env:GITHUB_ENV

      - name: Setup MSVC
        uses: TheMrMilchmann/setup-msvc-dev@v4.0.0
        with:
          arch: x86

      - name: Configure CMake
        shell: pwsh
        run: |
          $env:CC = "cl"
          $env:CXX = "cl"
          cmake -G Ninja -B "${{ env.BASE_BUILD_DIR }}\${{ matrix.configuration }}" `
            -DCMAKE_BUILD_TYPE=${{ matrix.configuration }} `
            -DVIRTOOLS_SDK_PATH="${{ github.workspace }}\Virtools-SDK-2.1" `
            -DBML_ENABLE_ANGELSCRIPT=ON `
            -DCKANGELSCRIPT_ROOT="${{ github.workspace }}\artifacts\ckangelscript-release" `
            -DCMAKE_INSTALL_PREFIX="${{ env.BASE_DIST_DIR }}\${{ matrix.configuration }}"

      - name: Build the project
        shell: pwsh
        run: cmake --build "${{ env.BASE_BUILD_DIR }}\${{ matrix.configuration }}"

      - name: Install binaries to distribution folder
        shell: pwsh
        run: >
          cmake --install "${{ env.BASE_BUILD_DIR }}\${{ matrix.configuration }}"
          --prefix "${{ env.BASE_DIST_DIR }}\${{ matrix.configuration }}"

      - name: Upload main SDK distribution artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: BMLPlus-${{ env.SHORT_SHA }}-${{ matrix.configuration }}
          path: ${{ env.BASE_DIST_DIR }}\${{ matrix.configuration }}
          retention-days: 14

      - name: Upload release SDK distribution artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7.0.1
        with:
          name: BMLPlus-${{ github.ref_name }}-SDK-${{ matrix.configuration }}
          path: ${{ env.BASE_DIST_DIR }}\${{ matrix.configuration }}
          retention-days: 14

      - name: Upload release runtime binary
        if: startsWith(github.ref, 'refs/tags/v') && matrix.configuration == 'Release'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: BMLPlus-${{ github.ref_name }}-Runtime-Binary
          path: |
            ${{ env.BASE_BUILD_DIR }}\${{ matrix.configuration }}\bin\BMLPlus.dll
            ${{ env.BASE_BUILD_DIR }}\${{ matrix.configuration }}\bin\Updater.exe
          retention-days: 14

      - name: Upload debug symbols
        if: startsWith(github.ref, 'refs/tags/v') && matrix.configuration == 'Debug'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: BMLPlus-${{ github.ref_name }}-Debug-Symbols
          path: ${{ env.BASE_BUILD_DIR }}\${{ matrix.configuration }}\bin\BMLPlus.pdb
          if-no-files-found: error
          retention-days: 14

  package-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ validate-release, build ]
    runs-on: windows-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6.0.2

      - name: Download Release SDK distribution
        uses: actions/download-artifact@v8.0.1
        with:
          name: BMLPlus-${{ github.ref_name }}-SDK-Release
          path: ${{ github.workspace }}\artifacts\sdk-release

      - name: Download Debug SDK distribution
        uses: actions/download-artifact@v8.0.1
        with:
          name: BMLPlus-${{ github.ref_name }}-SDK-Debug
          path: ${{ github.workspace }}\artifacts\sdk-debug

      - name: Download runtime binary
        uses: actions/download-artifact@v8.0.1
        with:
          name: BMLPlus-${{ github.ref_name }}-Runtime-Binary
          path: ${{ github.workspace }}\artifacts\runtime-bin

      - name: Download debug symbols
        uses: actions/download-artifact@v8.0.1
        with:
          name: BMLPlus-${{ github.ref_name }}-Debug-Symbols
          path: ${{ github.workspace }}\artifacts\debug-bin

      - name: Download CKAngelScript release
        shell: pwsh
        run: |
          $downloadDir = "${{ github.workspace }}\artifacts\ckangelscript"
          $extractDir = "${{ github.workspace }}\artifacts\ckangelscript-release"
          New-Item -ItemType Directory -Force -Path $downloadDir, $extractDir | Out-Null
          $archive = Join-Path $downloadDir "CKAngelScript-$env:CKANGELSCRIPT_VERSION-Release.zip"
          $url = "https://github.com/doyaGu/CKAngelScript/releases/download/$env:CKANGELSCRIPT_VERSION/CKAngelScript-$env:CKANGELSCRIPT_VERSION-Release.zip"
          Invoke-WebRequest -Uri $url -OutFile $archive
          Expand-Archive -LiteralPath $archive -DestinationPath $extractDir -Force
          foreach ($required in @(
            (Join-Path $extractDir 'bin\AngelScript.dll'),
            (Join-Path $extractDir 'include\CKAngelScript.h'),
            (Join-Path $extractDir 'include\angelscript.h')
          )) {
            if (-not (Test-Path -LiteralPath $required -PathType Leaf)) {
              throw "CKAngelScript release package is missing required file: $required"
            }
          }

      - name: Create release packages
        env:
          UPDATER_BASE_URL: ${{ vars.BML_UPDATER_BASE_URL }}
          UPDATER_DEFAULT_CHANNEL: ${{ vars.BML_UPDATER_DEFAULT_CHANNEL }}
        shell: pwsh
        run: |
          $packageArgs = @{
            Version = "${{ github.ref_name }}"
            ReleaseInstallDir = "${{ github.workspace }}\artifacts\sdk-release"
            DebugInstallDir = "${{ github.workspace }}\artifacts\sdk-debug"
            ReleaseBinaryDir = "${{ github.workspace }}\artifacts\runtime-bin"
            DebugBinaryDir = "${{ github.workspace }}\artifacts\debug-bin"
            OutputDir = "${{ github.workspace }}\packages"
            CKAngelScriptRuntimeDir = "${{ github.workspace }}\artifacts\ckangelscript-release"
            IncludeAngelScript = $true
            SkipUpdateSigning = $true
          }
          if ($env:UPDATER_BASE_URL) {
            $packageArgs.UpdaterBaseUrl = $env:UPDATER_BASE_URL
            if ($env:UPDATER_DEFAULT_CHANNEL) {
              $packageArgs.UpdaterDefaultChannel = $env:UPDATER_DEFAULT_CHANNEL
            }
          }
          .\scripts\Package-BMLRelease.ps1 @packageArgs

      - name: Upload release package artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: BMLPlus-${{ github.ref_name }}-Release-Packages
          path: ${{ github.workspace }}\packages\*.zip
          retention-days: 30

  draft-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ package-release ]
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6.0.2

      - name: Download release packages
        uses: actions/download-artifact@v8.0.1
        with:
          name: BMLPlus-${{ github.ref_name }}-Release-Packages
          path: ${{ github.workspace }}\packages

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $assets = @(Get-ChildItem -LiteralPath "${{ github.workspace }}\packages" -Filter '*.zip')
          if ($assets.Count -ne 4) {
            throw "Expected 4 release packages, found $($assets.Count)"
          }

          $assetPaths = @($assets | ForEach-Object { $_.FullName })
          $releaseJson = gh release view $tag --json isDraft 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag @assetPaths --draft --title $tag --notes "Draft release for $tag." --verify-tag
            exit $LASTEXITCODE
          }

          $release = $releaseJson | ConvertFrom-Json
          if (-not $release.isDraft) {
            Write-Host "Release $tag already exists and is not a draft; skipping asset upload."
            exit 0
          }

          gh release upload $tag @assetPaths --clobber
