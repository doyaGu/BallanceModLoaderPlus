site_name: Ballance Mod Loader Plus
site_description: BMLPlus documentation and Ballance script mod tutorial.
site_url: https://doyagu.github.io/BallanceModLoaderPlus/
repo_url: https://github.com/doyaGu/BallanceModLoaderPlus
repo_name: doyaGu/BallanceModLoaderPlus
docs_dir: docs
site_dir: site
hooks:
  - docs/hooks/pygments_angelscript.py

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite

exclude_docs: |
  hooks/**
  maintenance/**
  bml-release-packaging-process.md
  bml-script-api-redesign-plan.md
  bml-script-facade-coverage.md
  bml-script-mod-author-guide.md
  bml-script-mod-validation.md
  bml-script-v1-contract.md
  bml-updater-design.md
  script-mod-tutorial/archive/**
  script-mod-tutorial/libs/**
  script-mod-tutorial-materials/**
  script-mod-tutorial-outline.md
  script-mod-tutorial-research.md
  script-mod-tutorial-gap-audit.md
  superpowers/**

nav:
  - 首页: index.md
  - 脚本 Mod 教程:
      - 导读: script-mod-tutorial/README.md
      - 第一篇：脚本先跑起来:
          - 第 0 章：几个名字到底指什么: script-mod-tutorial/00-background.md
          - 第 1 章：脚本 mod 的范围: script-mod-tutorial/01-script-mod-scope.md
          - 第 2 章：AngelScript 最小语法: script-mod-tutorial/02-angelscript-minimum-syntax.md
          - 第 3 章：第一个可加载脚本: script-mod-tutorial/03-first-loadable-script.md
          - 第 4 章：BML 怎么调用脚本: script-mod-tutorial/04-bml-callback-model.md
          - 第 5 章：让脚本在游戏里可见: script-mod-tutorial/05-logs-window-fps.md
          - 第 6 章：命令: script-mod-tutorial/06-command.md
          - 第 7 章：配置: script-mod-tutorial/07-config.md
          - 第 8 章：Timer: script-mod-tutorial/08-timer.md
          - 第 9 章：第一篇排错流程: script-mod-tutorial/09-first-stage-troubleshooting.md
          - 第 10 章：怎么查脚本 API: script-mod-tutorial/10-how-to-read-script-api.md
          - 第 11 章：第一篇收束：基础脚本模板: script-mod-tutorial/11-basic-script-template.md
      - 第二篇：看懂游戏运行时:
          - 第 12 章：Ballance 文件各自负责什么: script-mod-tutorial/12-ballance-file-roles.md
          - 第 13 章：对象、实体和名字: script-mod-tutorial/13-objects-entities-and-names.md
          - 第 14 章：组是对象名单: script-mod-tutorial/14-groups-are-object-lists.md
          - 第 15 章：DataArray 是运行时表: script-mod-tutorial/15-dataarray-runtime-tables.md
          - 第 16 章：行为图和 Building Block: script-mod-tutorial/16-behavior-graphs-and-building-blocks.md
          - 第 17 章：用检查点串起四个概念: script-mod-tutorial/17-checkpoint-mental-model.md
